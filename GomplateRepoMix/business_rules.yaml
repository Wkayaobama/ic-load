resolution_policy:
  name: prefer_record_with_most_metadata
  rationale: "Richer records usually indicate FK-resolved rows with more trustworthy downstream joins."
  non_negotiable: true

metadata_segmentation:
  non_negotiable: true
  rule: "Assessment outputs must keep legacy source fields, Silver canonical fields, Gold HubSpot-shaped fields, and StackSync resolution metadata in separate segments."
  do_not_mix:
    - "stacksync_record_id_* columns into Silver business payload"
    - "stacksync_record_id_* columns into Gold property translation"
  communication_note: "Communication requires an extra dbt classification/reconciliation boundary before HubSpot engagement payload shape exists."

text_normalization:
  non_negotiable: true
  scope: "universal across company/contact/opportunity/communication/case"
  contract: "GomplateRepoMix/text_normalization_rules.yaml"
  rule: "UTF-8/mojibake cleanup is a shared preprocessing rule, not an entity-specific workaround."
  requirements:
    - "Read CSV inputs with utf-8-sig semantics."
    - "Repair common mojibake patterns before mapping to HubSpot-shaped fields."
    - "Strip unsafe control characters while preserving meaningful note/description line breaks."
    - "Apply the same cleaner to long-form text and identity text fields before staging normalization."

company_hierarchy:
  non_negotiable: true
  authorities:
    - "../../ic_load_pipeline/python-ignorethis/custom_objects/create_company_hierarchy.py"
    - "../../ic_load_pipeline/python-ignorethis/custom_objects/upsert_sibling_companies.py"
    - "../../custom_objects/SIBLING_COMPANY_PIPELINE.md"
  rule: "Parent-child company hierarchy, sibling inference, and root-name grouping belong to one transformation package and must not be separated during salvage."
  hierarchy_order:
    - "Determine canonical parent company first."
    - "Infer child/sibling records relative to that parent."
    - "Use domain and common-root similarity signals to flag likely sibling groups."
    - "Carry those flags forward into downstream association planning."
  notes:
    - "Levenshtein-style or common-root similarity is not a cosmetic dedupe helper; it refines sibling inference after parent selection."
    - "Company hierarchy logic should be packaged either as its own deployable folder or as a dedicated runner adjunct with high-fidelity context."

dedupe_guardrail:
  non_negotiable: true
  rule: "Run a staging-vs-reference duplicate guard before Gold upserts and mirrored association writes."
  current_state: "preserved for probe/calibration only until the matching contract is fully entity-config-driven"
  block_on_review_in_live_mode: true
  notes:
    - "Association table idempotency does not protect against linking the wrong live entity."
    - "Use benchmark exports and staging tables for calibration before any live production write."
  thresholds:
    company:
      review_score_min: 0.65
      block_score_min: 0.82
    contact:
      review_score_min: 0.60
      block_score_min: 0.80
    opportunity:
      review_score_min: 0.62
      block_score_min: 0.78
    case:
      review_score_min: 0.65
      block_score_min: 0.82

deal_stage_mapper:
  non_negotiable: true
  authority: "../../ic_load_pipeline/python-ignorethis/deal_stage_mapper.py"
  legacy_reference: "../../DEAL_STAGE_MAPPING_VISUAL.md"
  rule: "Deal stage mapping must resolve pipeline + stage + outcome to HubSpot-native pipeline/stage IDs."
  normalization:
    stage_names: true
    outcome_names: true
  supported_pipeline_ids:
    hardware: 766126206
  notes:
    - "The mapper source is authoritative over older design notes if they conflict."
    - "The runner and packaging context must preserve this rule as a business constraint, not a convenience helper."
